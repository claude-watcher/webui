<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code Watcher</title>
<style>
  /* Colors mirror the GTK widget (claude-watcher-gtk.py). */
  :root {
    --bg: #1b1b1f; --panel: #232329; --line: #34343c;
    --txt: #e2e2e2; --dim: #888898; --claude: #cc785c;
    --waiting: #e86c3a; --working: #d4a052; --idle: #4caf7d;
    --ctx-hi: #e86c3a; --ctx-mid: #d4a052;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  header {
    display: flex; align-items: center; gap: 10px; padding: 11px 16px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg);
    flex-wrap: wrap;
  }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  header .meta { color: var(--dim); font-size: 12px; margin-left: auto; }
  #status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--idle); }
  #status-dot.stale { background: var(--waiting); }
  main { padding: 12px 16px; max-width: 1100px; margin: 0 auto; }
  .empty { color: var(--dim); text-align: center; padding: 48px 0; }

  /* Settings bar — mirrors the TUI's sort / idle-format / topic / cards options.
     Per-browser (localStorage), applied client-side; no shared server state. */
  .controls {
    flex-basis: 100%; display: flex; flex-wrap: wrap; gap: 14px;
    align-items: center; padding-top: 4px; color: var(--dim); font-size: 12px;
  }
  .controls label { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
  .controls select {
    background: var(--panel); border: 1px solid var(--line); border-radius: 5px;
    color: var(--txt); font: inherit; padding: 2px 5px; cursor: pointer;
  }
  .controls input[type=checkbox] { accent-color: var(--claude); cursor: pointer; }
  /* `display:flex` above beats the UA [hidden]{display:none}; restore it explicitly. */
  .controls[hidden] { display: none; }
  .gear {
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: 0; color: var(--dim); font-size: 15px; line-height: 1;
    cursor: pointer; padding: 0; margin-left: 2px;
  }
  .gear:hover, .gear.open { color: var(--claude); }

  /* Row: [dot] [info grows] [status + tool, right-aligned] — same as GTK. */
  .row {
    display: flex; align-items: center; gap: 12px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 7px;
    padding: 8px 12px; margin-bottom: 8px;
  }
  /* Cards layout: roomier gap between sessions (the TUI 'c' toggle). */
  main.cards .row { margin-bottom: 18px; }
  .dot { flex: 0 0 8px; width: 8px; height: 8px; border-radius: 50%; }
  .dot.waiting { background: var(--waiting); animation: pulse 1.2s ease-in-out infinite; }
  .dot.working { background: var(--working); }
  .dot.idle    { background: var(--idle); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  .info { flex: 1 1 auto; min-width: 0; }
  .info > div { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .proj { font-weight: 600; color: var(--txt); }
  .wt   { color: var(--claude); font-size: 12px; }
  .topic { color: var(--dim); font-size: 12px; font-style: italic; }
  .metaline { color: var(--dim); font-size: 12px; }
  .metaline .ctx-hi  { color: var(--ctx-hi); }
  .metaline .ctx-mid { color: var(--ctx-mid); }
  .metaline .cfg { color: var(--claude); }

  .right { flex: 0 0 auto; text-align: right; }
  .badge { font-size: 12px; font-weight: 600; }
  .badge.waiting { color: var(--waiting); }
  .badge.working { color: var(--working); }
  .badge.idle    { color: var(--idle); }
  .tool { color: var(--dim); font-size: 12px; }

  .login { max-width: 360px; margin: 60px auto; text-align: center; }
  .login input {
    width: 100%; padding: 9px 11px; margin: 10px 0; background: var(--panel);
    border: 1px solid var(--line); border-radius: 6px; color: var(--txt); font: inherit;
  }
  .login button {
    width: 100%; padding: 9px; background: var(--idle); border: 0; border-radius: 6px;
    color: #10231a; font: inherit; font-weight: 700; cursor: pointer;
  }
  .login .err { color: var(--waiting); font-size: 12px; min-height: 16px; }
</style>
</head>
<body>
<header>
  <span id="status-dot"></span>
  <h1>Claude Code Watcher</h1>
  <span class="meta" id="meta"></span>
  <button class="gear" id="settings-btn" hidden title="Settings" aria-label="Toggle settings" aria-expanded="false">⚙</button>
  <div class="controls" id="controls" hidden>
    <label>sort
      <select id="opt-sort">
        <option value="default">default</option>
        <option value="idle">by idle time</option>
      </select>
    </label>
    <label>idle
      <select id="opt-idle">
        <option value="none">hidden</option>
        <option value="loose">approx.</option>
        <option value="precise">precise</option>
      </select>
    </label>
    <label><input type="checkbox" id="opt-topic"> topic</label>
    <label><input type="checkbox" id="opt-cards"> cards</label>
  </div>
</header>
<main id="main"><div class="empty">Loading…</div></main>

<script>
const TOKEN_KEY = "ccw_token";
const POLL_MS = 2000;
let pollTimer = null;
let devInstance = null;  // dev livereload: reload when the server restarts
let lastData = null;     // last payload, so toggling a control re-renders instantly

const $main = document.getElementById("main");
const $meta = document.getElementById("meta");
const $dot = document.getElementById("status-dot");
const $controls = document.getElementById("controls");
const $gear = document.getElementById("settings-btn");

// Display preferences — per-browser, mirroring the TUI's options. Defaults match
// the TUI: alpha sort, idle duration hidden, topic shown, flat (non-card) layout.
const PREFS_KEY = "ccw_prefs";
const PREFS_DEFAULT = { sort: "default", idle: "none", topic: true, cards: false };
function loadPrefs() {
  const p = { ...PREFS_DEFAULT };
  let stored = {};
  try { stored = JSON.parse(localStorage.getItem(PREFS_KEY) || "{}"); } catch (e) { /* ignore */ }
  // Copy only known keys → unknown/legacy keys (e.g. an old persisted `panel`) are
  // dropped rather than carried back into prefs and re-saved.
  for (const k of Object.keys(PREFS_DEFAULT)) if (k in stored) p[k] = stored[k];
  return p;
}
let prefs = loadPrefs();
function savePrefs() { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); }
// Filter bar visibility — runtime only (NOT persisted): always hidden on load,
// the ⚙ button reveals it for the session.
let panelOpen = false;
function syncPanel() {
  $controls.hidden = !panelOpen;
  $gear.classList.toggle("open", panelOpen);
  $gear.setAttribute("aria-expanded", String(panelOpen));
}

const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function fmtElapsed(s) {
  s = Math.max(0, s | 0);
  if (s < 60) return s + "s";
  if (s < 3600) return (s / 60 | 0) + "m";
  return (s / 3600 | 0) + "h" + String((s % 3600) / 60 | 0).padStart(2, "0");
}
// Idle duration, mirroring the TUI's format_idle. Input is the SERVER-computed
// `idle_seconds` (clock-skew proof — see detect.scan_sessions), not a timestamp:
//   'none' → hidden, 'loose' → [Nd ]HH:MM, 'precise' → [Nd ]HH:MM:SS.
function fmtIdle(secs, mode) {
  if (mode === "none" || secs == null) return "";
  const s = Math.max(0, secs | 0);
  const d = (s / 86400) | 0, h = ((s % 86400) / 3600) | 0;
  const m = ((s % 3600) / 60) | 0, sec = s % 60;
  const p = (n) => String(n).padStart(2, "0");
  const clock = mode === "precise"
    ? p(h) + ":" + p(m) + ":" + p(sec)
    : p(h) + ":" + p(m);
  return d ? d + "d " + clock : clock;
}
function ctxSpan(pct) {
  if (pct == null) return "";
  const cls = pct >= 80 ? "ctx-hi" : pct >= 60 ? "ctx-mid" : "";
  return ` · <span class="${cls}">ctx ${pct}%</span>`;
}

// State priority bucket (waiting > working > idle).
function bucket(s) { return s.state === "waiting" ? 0 : s.state === "working" ? 1 : 2; }
// 'default' = trust the server's order (state then project — see
// detect.scan_sessions), avoiding a redundant client re-sort that could disagree
// on collation. 'idle' = re-sort client-side: state, then for idle rows only the
// most-recently-idle first (active rows keep the server's order — their JSONL
// mtime churns and would reorder every poll). Missing idle_seconds sinks via +inf.
function sortSessions(sessions) {
  if (prefs.sort !== "idle") return sessions;
  const arr = sessions.slice();
  arr.sort((a, b) => {
    const ba = bucket(a), bb = bucket(b);
    if (ba !== bb) return ba - bb;
    if (ba === 2) {
      const ia = a.idle_seconds == null ? Infinity : a.idle_seconds;
      const ib = b.idle_seconds == null ? Infinity : b.idle_seconds;
      if (ia !== ib) return ia - ib;
    }
    return a.project.toLowerCase().localeCompare(b.project.toLowerCase());
  });
  return arr;
}

function authHeaders() {
  const t = localStorage.getItem(TOKEN_KEY);
  return t ? { "X-API-Key": t } : {};
}

function renderSessions(data) {
  // Dev livereload: a changed instance id means the server restarted on an edit.
  if (data.dev && data.instance) {
    if (devInstance && devInstance !== data.instance) { location.reload(); return; }
    devInstance = data.instance;
  }
  lastData = data;
  $dot.classList.remove("stale");
  $gear.hidden = false;
  syncPanel();
  $meta.textContent = data.count + (data.count === 1 ? " session" : " sessions")
    + " · " + new Date().toLocaleTimeString();
  $main.classList.toggle("cards", prefs.cards);
  if (!data.sessions.length) {
    $main.innerHTML = '<div class="empty">No running Claude Code sessions.</div>';
    return;
  }
  $main.innerHTML = sortSessions(data.sessions).map((s) => {
    const active = s.state === "working" || s.state === "waiting";
    const wt = s.worktree
      ? `<div class="wt" title="${esc(s.cwd)}">↳ WT: ${esc(s.worktree)}</div>` : "";
    const topic = prefs.topic && s.topic
      ? `<div class="topic" title="${esc(s.topic)}">${esc(s.topic)}</div>` : "";
    const cfg = s.config_dir ? ` <span class="cfg">✳${esc(s.config_dir)}</span>` : "";
    const meta = `pid ${s.pid} · ${fmtElapsed(s.elapsed)}${ctxSpan(s.context_pct)}${cfg}`;
    // Right column tracks GTK: state word on top, current tool (active) or idle
    // duration (idle) below.
    const tool = active && s.tool ? esc(s.tool)
               : (s.state === "idle" ? fmtIdle(s.idle_seconds, prefs.idle) : "");
    return `<div class="row">
      <span class="dot ${esc(s.state)}"></span>
      <div class="info">
        <div class="proj" title="${esc(s.cwd)}">${esc(s.project)}</div>
        ${wt}${topic}
        <div class="metaline">${meta}</div>
      </div>
      <div class="right">
        <div class="badge ${esc(s.state)}">${esc(s.state)}</div>
        ${tool ? `<div class="tool">${tool}</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

// Reflect saved prefs into the controls and wire change handlers: the four prefs
// persist to localStorage and re-render the last payload; the ⚙ button toggles the
// (non-persisted) filter-bar visibility.
function initControls() {
  const sort = document.getElementById("opt-sort");
  const idle = document.getElementById("opt-idle");
  const topic = document.getElementById("opt-topic");
  const cards = document.getElementById("opt-cards");
  sort.value = prefs.sort; idle.value = prefs.idle;
  topic.checked = prefs.topic; cards.checked = prefs.cards;
  const apply = () => {
    prefs.sort = sort.value; prefs.idle = idle.value;
    prefs.topic = topic.checked; prefs.cards = cards.checked;
    savePrefs();
    if (lastData) renderSessions(lastData);
  };
  [sort, idle, topic, cards].forEach((el) => el.addEventListener("change", apply));
  $gear.addEventListener("click", () => { panelOpen = !panelOpen; syncPanel(); });
}

function showLogin(msg) {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  $meta.textContent = "";
  $gear.hidden = true;
  $controls.hidden = true;
  $main.innerHTML = `
    <div class="login">
      <p>This watcher requires a key.</p>
      <input id="tok" type="password" placeholder="API key / password" autofocus>
      <div class="err">${esc(msg || "")}</div>
      <button id="go">Unlock</button>
    </div>`;
  const submit = () => {
    const v = document.getElementById("tok").value.trim();
    if (v) { localStorage.setItem(TOKEN_KEY, v); start(); }
  };
  document.getElementById("go").onclick = submit;
  document.getElementById("tok").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
}

async function poll() {
  try {
    const r = await fetch("/api/sessions", { headers: authHeaders() });
    if (r.status === 401) {
      localStorage.removeItem(TOKEN_KEY);
      showLogin("Invalid key, try again.");
      return;
    }
    if (!r.ok) throw new Error("HTTP " + r.status);
    renderSessions(await r.json());
  } catch (e) {
    $dot.classList.add("stale");
    $meta.textContent = "connection lost · retrying";
  }
}

async function start() {
  // Probe auth requirement so we only show the login form when needed.
  let authRequired = false;
  try {
    authRequired = (await (await fetch("/api/meta")).json()).auth_required;
  } catch (e) { /* offline: fall through to poll, which surfaces the error */ }
  if (authRequired && !localStorage.getItem(TOKEN_KEY)) { showLogin(); return; }
  await poll();
  if (!pollTimer) pollTimer = setInterval(poll, POLL_MS);
}

initControls();
start();
</script>
</body>
</html>
