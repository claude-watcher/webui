repos:
  # ruff as a LOCAL hook (uv run) rather than the astral mirror: pins ruff to the
  # project's uv.lock — the SAME version CI runs (`uv run ruff format --check`) — so
  # a lint/format rule can't pass pre-commit yet fail CI on a version skew. Same
  # single-source-of-truth rationale as the mypy hook below.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py314-plus]

  # Local hook (not mirrors-mypy): type-checking a FastAPI app needs the real
  # runtime deps (starlette/fastapi/pydantic-settings). Running mypy in the
  # project's uv env is the single source of truth and avoids duplicating—and
  # drifting—a dependency list under additional_dependencies.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
